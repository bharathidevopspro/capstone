<!DOCTYPE html>
<html>
<head>
    <title>🚀 Bharathi DevOps Project</title>
    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            font-size: 50px;
        }
        p {
            font-size: 20px;
        }
        .box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 15px;
        }
        .btn {
            background: #ff9800;
            padding: 10px 20px;
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn:hover {
            background: #e68900;
        }
    </style>
</head>
<body>

    <h1>🔥 Welcome to My DevOps Project 🚀</h1>

    <div class="box">
        <p>Hi, I'm Bharathi 👨‍💻</p>
        <p>This project is deployed using:</p>
        <p>⚙️ Jenkins | 🐳 Docker | ☸️ Kubernetes | ☁️ AWS</p>
    </div>

    <div class="box">
        <p>💡 Fully Automated CI/CD Pipeline</p>
        <p>📦 Containerized Application</p>
        <p>📊 Monitored with Prometheus & Grafana</p>
    </div>

    <button class="btn" onclick="showMessage()">Click Me 🎉</button>

    <script>
        function showMessage() {
            alert("🚀 DevOps Pipeline Working Successfully!");
        }
    </script>

</body>
</html>
